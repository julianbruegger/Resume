services:
  resume:
    build: .
    ports:
      - "6969:80"
    networks:
      - tunnel-network

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - tunnel-network
    depends_on:
      - resume

networks:
  tunnel-network:
    driver: bridge
